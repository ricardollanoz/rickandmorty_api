<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <header>
            <img src="img/logo2.png" alt="logo">
        </header>
        <div id="filters">
            <select id="gender-filter">
                <option value="">Filtrado por genero: All</option> 
                <option value="Female">Femenino</option>
                <option value="Male">Masculino</option>
                <option value="unknown">Desconocido</option>
            </select>
        
        </div>
        <div id="loading">Cargando personajes...</div>
        <div class="pagination">
            <button id="loadLess" data-prev="" onclick="loadMore('prev')">Anterior</button>
            
            <!-- Aquí ponemos el número -->
            <span id="pageId">Página 1 de 42</span>
            
            <button id="loadMore" data-next="" onclick="loadMore('next')">Siguiente</button>
        </div>
        <ul id="character"></ul>
        <div class="pagination">
            
    </main>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.16.0/dist/axios.min.js"></script>
    <script src="api.js"></script>
</body>
</html>
